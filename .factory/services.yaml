commands:
  install: pip install -e ".[dev]"
  test: python -m pytest tests/ -x -v --tb=short -n 4
  typecheck: python -m mypy snipsnap/ --ignore-missing-imports
  lint: python -m ruff check snipsnap/ tests/

services:
  web:
    start: PORT=3200 python -m uvicorn snipsnap.web.app:app --host 0.0.0.0 --port 3200
    stop: lsof -ti :3200 | xargs kill
    healthcheck: curl -sf http://localhost:3200/health
    port: 3200
    depends_on: []
